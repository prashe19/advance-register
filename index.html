function openImportModal() {
  const overlay = openModal(`
    <div class="modal-head">
      <div><h2>Import from Excel</h2></div>
      <button class="modal-close" type="button" data-close aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label for="import-file">Excel file (.xlsx)</label>
        <input type="file" id="import-file" accept=".xlsx" />
      </div>
      <div class="field-hint">
        Columns recognised: Roll No, Name, Amount, Date Given, and optionally Email, Department,
        Conference Start/End Date, Purpose, Voucher No. Matching an existing pending record (by roll no + name)
        updates it; anything else is added as new, pending settlement. Leave Voucher No. blank to auto-generate it.
      </div>
      <div id="import-status"></div>
      <div id="import-results"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" type="button" data-close>Close</button>
      <button class="btn" type="button" id="import-submit">Import</button>
    </div>
  `);
  overlay.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", () => { closeModal(); refreshCurrentView(); }));

  overlay.querySelector("#import-submit").addEventListener("click", async () => {
    const fileInput = overlay.querySelector("#import-file");
    const file = fileInput.files[0];
    const statusBox = overlay.querySelector("#import-status");
    const resultsBox = overlay.querySelector("#import-results");
    resultsBox.innerHTML = "";
    if (!file) {
      statusBox.innerHTML = `<div class="form-error-banner">Choose a file first.</div>`;
      return;
    }
    const form = new FormData();
    form.append("file", file);

    const btn = overlay.querySelector("#import-submit");
    btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Importing…`;
    statusBox.innerHTML = `<div class="field-hint">Importing…</div>`;
    try {
      const data = await api("/api/import", { method: "POST", form });
      statusBox.innerHTML = `<div class="form-success-banner">Done: ${data.inserted} added, ${data.updated} updated, ${data.skipped.length} skipped.</div>`;
      if (data.skipped.length) {
        resultsBox.innerHTML = "<ul class='history-list'>" + data.skipped.map(s =>
          `<li class="history-item"><div class="history-what">Row ${s.row}: ${escapeHtml(s.reason)}</div></li>`
        ).join("") + "</ul>";
      }
      refreshCurrentView();
    } catch (err) {
      statusBox.innerHTML = `<div class="form-error-banner">${escapeHtml(err.message || "Import failed.")}</div>`;
    } finally {
      btn.disabled = false; btn.textContent = "Import";
    }
  });
}

/* ==========================================================================
   CHANGE PASSWORD MODAL
   ========================================================================== */
function openChangePasswordModal() {
  const overlay = openModal(`
    <div class="modal-head">
      <div><h2>Change password</h2></div>
      <button class="modal-close" type="button" data-close aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <div id="cp-error"></div>
      <form id="cp-form">
        <div class="field">
          <label for="cp-current">Current password</label>
          <input id="cp-current" type="password" autocomplete="current-password" required />
        </div>
        <div class="field">
          <label for="cp-new">New password (min 6 characters)</label>
          <input id="cp-new" type="password" autocomplete="new-password" required />
        </div>
      </form>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" type="button" data-close>Cancel</button>
      <button class="btn" type="submit" form="cp-form">Change password</button>
    </div>
  `);
  overlay.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));

  overlay.querySelector("#cp-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errBox = overlay.querySelector("#cp-error");
    errBox.innerHTML = "";
    const current_password = overlay.querySelector("#cp-current").value;
    const new_password = overlay.querySelector("#cp-new").value;
    try {
      await api("/api/me/password", { method: "POST", body: { current_password, new_password } });
      toast("Password changed.", "success");
      closeModal();
    } catch (err) {
      errBox.innerHTML = `<div class="form-error-banner">${escapeHtml(err.message || "Could not change password.")}</div>`;
    }
  });
}

/* ==========================================================================
   MANAGE USERS MODAL (admin only)
   ========================================================================== */
function openManageUsersModal() {
  const overlay = openModal(`
    <div class="modal-head">
      <div><h2>Manage users</h2></div>
      <button class="modal-close" type="button" data-close aria-label="Close">×</button>
    </div>
    <div class="modal-body">
      <div id="mu-list"><div class="field-hint">Loading…</div></div>
      <div style="margin-top:18px; padding-top:14px; border-top:1px solid var(--border-soft);">
        <div class="field">
          <label for="mu-username">New username</label>
          <input id="mu-username" />
        </div>
        <div class="field">
          <label for="mu-email">Email (needed for that user's self-service password reset)</label>
          <input id="mu-email" type="email" />
        </div>
        <div class="field">
          <label for="mu-password">Password (min 6 characters)</label>
          <input id="mu-password" type="password" />
        </div>
        <div class="field">
          <label for="mu-role">Role</label>
          <select id="mu-role">
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div id="mu-create-error"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" type="button" data-close>Close</button>
      <button class="btn" type="button" id="mu-create-btn">Create user</button>
    </div>
  `, { wide: true });
  overlay.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));

  async function refreshUserList() {
    const listBox = overlay.querySelector("#mu-list");
    try {
      const users = await api("/api/users");
      listBox.innerHTML = users.map(u => `
        <div class="history-item" style="align-items:center;">
          <div>
            <div class="history-who">${escapeHtml(u.username)} <span class="pill">${escapeHtml(u.role)}</span></div>
            <div class="field-hint">${escapeHtml(u.email || "no email on file")}</div>
          </div>
          <div class="btn-row">
            <button class="btn btn-sm btn-ghost" data-reset-id="${u.id}" data-reset-name="${escapeHtml(u.username)}">Reset password</button>
            ${u.username === state.user.username ? "" : `<button class="btn btn-sm btn-danger-ghost" data-del-id="${u.id}">Delete</button>`}
          </div>
        </div>
      `).join("");

      listBox.querySelectorAll("[data-del-id]").forEach(b => b.addEventListener("click", async () => {
        if (!confirm("Delete this user account?")) return;
        try {
          await api(`/api/users/${b.dataset.delId}`, { method: "DELETE" });
          toast("User deleted.", "success");
          refreshUserList();
        } catch (err) { toast(err.message || "Could not delete user.", "error"); }
      }));
      listBox.querySelectorAll("[data-reset-id]").forEach(b => b.addEventListener("click", async () => {
        const newPassword = prompt(`New password for ${b.dataset.resetName} (min 6 characters):`);
        if (!newPassword) return;
        if (newPassword.length < 6) { alert("Password must be at least 6 characters."); return; }
        try {
          await api(`/api/users/${b.dataset.resetId}/reset-password`, { method: "POST", body: { new_password: newPassword } });
          toast(`Password reset for ${b.dataset.resetName}. They're logged out everywhere.`, "success");
        } catch (err) { toast(err.message || "Could not reset password.", "error"); }
      }));
    } catch (err) {
      listBox.innerHTML = `<div class="form-error-banner">${escapeHtml(err.message || "Could not load users.")}</div>`;
    }
  }

  overlay.querySelector("#mu-create-btn").addEventListener("click", async () => {
    const errBox = overlay.querySelector("#mu-create-error");
    errBox.innerHTML = "";
    const username = overlay.querySelector("#mu-username").value.trim();
    const email = overlay.querySelector("#mu-email").value.trim();
    const password = overlay.querySelector("#mu-password").value;
    const role = overlay.querySelector("#mu-role").value;
    try {
      const data = await api("/api/users", { method: "POST", body: { username, email, password, role } });
      toast(`Created ${data.username} (${data.role}).`, "success");
      overlay.querySelector("#mu-username").value = "";
      overlay.querySelector("#mu-email").value = "";
      overlay.querySelector("#mu-password").value = "";
      refreshUserList();
    } catch (err) {
      errBox.innerHTML = `<div class="form-error-banner">${escapeHtml(err.message || "Could not create user.")}</div>`;
    }
  });

  refreshUserList();
}

/* ==========================================================================
   INIT
   ========================================================================== */
(async function init() {
  if (state.token) {
    try {
      const me = await api("/api/me");
      state.user = { username: me.username, role: me.role };
      await bootApp();
      return;
    } catch (e) {
      // token invalid/expired — fall through to login
    }
  }
  renderLogin();
})();
</script>
</body>
