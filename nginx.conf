# nginx site config for the Advance Register.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/advance-register
#   sudo ln -s /etc/nginx/sites-available/advance-register /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then get a free certificate (this rewrites the file to add the SSL
# server block automatically):
#   sudo certbot --nginx -d advances.yourinstitute.edu
#
# Replace advances.yourinstitute.edu below with your real domain first.

server {
    listen 80;
    server_name advances.yourinstitute.edu;

    # Serve the frontend (index.html + any static assets) directly.
    root /opt/advance-register/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls through to gunicorn on localhost.
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Export downloads (xlsx/pdf) can take a moment to generate.
        proxy_read_timeout 60s;
    }

    # Uploaded/generated files are never this large, but keep a sane cap
    # against oversized request bodies regardless (Excel import, etc.)
    client_max_body_size 10m;
}
